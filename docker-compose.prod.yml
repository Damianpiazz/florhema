name: florhema-prod

networks:
  florhema-network:
    driver: bridge

services:
  florhema-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: florhema-backend-prod
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://florhema_user:florhema_pass@florhema-postgres:5432/florhema_db"
      OTEL_COLLECTOR_HOST: otel-collector
      NODE_ENV: production
    depends_on:
      florhema-postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - florhema-network

  florhema-postgres:
    image: postgres:16
    container_name: florhema-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: florhema_db
      POSTGRES_USER: florhema_user
      POSTGRES_PASSWORD: florhema_pass
    ports:
      - "5432:5432"
    volumes:
      - florhema_postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U florhema_user -d florhema_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - florhema-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: florhema-otel-collector-prod
    restart: always
    ports:
      - "4318:4318"
      - "9464:9464"
    volumes:
      - ./observability/otel-collector/config.yml:/etc/otel-collector/config.yml:ro
    command: ["--config=/etc/otel-collector/config.yml"]
    depends_on:
      florhema-backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - florhema-network

  prometheus:
    image: prom/prometheus:latest
    container_name: florhema-prometheus-prod
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - florhema_prometheus_data_prod:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - florhema-network

  grafana:
    image: grafana/grafana:latest
    container_name: florhema-grafana-prod
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - florhema_grafana_data_prod:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - florhema-network

volumes:
  florhema_postgres_data_prod:
  florhema_prometheus_data_prod:
  florhema_grafana_data_prod:
