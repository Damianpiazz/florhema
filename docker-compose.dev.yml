name: florhema-dev

networks:
  florhema-network:
    driver: bridge

services:
  florhema-backend:
    build:
      context: ./backend
      target: dev
    container_name: florhema-backend-dev
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://florhema_user:florhema_pass@florhema-postgres:5432/florhema_db"
      OTEL_COLLECTOR_HOST: otel-collector
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - /app/node_modules
    depends_on:
      florhema-postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - florhema-network

  florhema-postgres:
    image: postgres:16
    container_name: florhema-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: florhema_db
      POSTGRES_USER: florhema_user
      POSTGRES_PASSWORD: florhema_pass
    ports:
      - "5432:5432"
    volumes:
      - florhema_postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U florhema_user -d florhema_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - florhema-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: florhema-otel-collector-dev
    ports:
      - "4318:4318"   # OTLP HTTP
      - "9464:9464"   # Prometheus exporter
    volumes:
      - ./otel-collector/config.yml:/etc/otel-collector/config.yml:ro
    command: ["--config=/etc/otel-collector/config.yml"]
    depends_on:
      florhema-backend:
        condition: service_started
    networks:
      - florhema-network

  prometheus:
    image: prom/prometheus:latest
    container_name: florhema-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - florhema_prometheus_data_dev:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - florhema-network

  grafana:
    image: grafana/grafana:latest
    container_name: florhema-grafana-dev
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - florhema_grafana_data_dev:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - florhema-network

volumes:
  florhema_postgres_data_dev:
  florhema_prometheus_data_dev:
  florhema_grafana_data_dev:
