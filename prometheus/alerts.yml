# Alerting rules for florhema API — RED metrics
# These rules are evaluated against metrics scraped from the OTEL Collector.
#
# Metric names referenced here match our custom RED metrics defined in
# src/config/metrics.ts:
#   http_server_request_duration_seconds_*  — our histogram (unit baked into name)
#   http_requests_total                     — our counter
#   http_requests_active                    — our updown counter
#
# The auto-instrumentation metrics (http_server_duration_*) also exist but
# are NOT used by these rules — we use the custom RED metrics instead.

groups:
  - name: florhema-red-metrics
    interval: 15s
    rules:
      # -------------------------------------------------------
      # RATE — RequestRate: no requests received for 2 minutes
      # -------------------------------------------------------
      - alert: RequestRateZero
        expr: |
          rate(http_server_request_duration_seconds_count[2m]) == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Zero request rate for {{ $labels.service }}"
          description: |
            No HTTP requests received for the last 2 minutes on instance {{ $labels.instance }}.
            This could indicate a routing or availability issue.

      # -------------------------------------------------------
      # ERRORS — HighErrorRate: error ratio exceeds 1% for 5min
      # -------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_duration_count{http_status_code=~"5.."}[5m]))
          /
            sum(rate(http_server_duration_count[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate ({{ $value | humanizePercentage }}) for florhema API"
          description: |
            The API error rate has exceeded 1% over the last 5 minutes.
            Current error ratio: {{ $value | humanizePercentage }}.

      # -------------------------------------------------------
      # LATENCY — HighLatencyP95: p95 > 1s for 5min
      # -------------------------------------------------------
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_duration_bucket[5m])) by (le)
          ) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency exceeds 1s ({{ $value }}s) for florhema API"
          description: |
            The 95th percentile response time is {{ $value }}s, above the 1s threshold.

      # -------------------------------------------------------
      # LATENCY — HighLatencyP99: p99 > 2s for 5min
      # -------------------------------------------------------
      - alert: HighLatencyP99
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_server_duration_bucket[5m])) by (le)
          ) > 2.0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "P99 latency exceeds 2s ({{ $value }}s) for florhema API"
          description: |
            The 99th percentile response time is {{ $value }}s, above the 2s threshold.
